
replicaCount: 3

image:
  repository: mayam123/quakewatch
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

configmap:
  appEnv: production
  refreshInterval: "30"
  maxResults: "100"
  defaultLocation: "Tel Aviv, Israel"
  logLevel: INFO

secret:
  apiKey: YWJjZGVmZ2hpams=
  dbPassword: cGFzc3dvcmQxMjM=

cronjob:
  enabled: true
  schedule: "*/5 * * * *"