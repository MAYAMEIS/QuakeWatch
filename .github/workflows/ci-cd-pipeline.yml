name: QuakeWatch CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint flask requests matplotlib
    
    - name: Run pylint on Python files
      run: |
        echo "Testing with Python ${{ matrix.python-version }}"
        cd Phase1-QuakeWatch
        pylint *.py --exit-zero || echo "Pylint completed with warnings"
  
  build:
    needs: lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        cd Phase1-QuakeWatch
        docker build -t quakewatch:test .
    
    - name: Test container
      run: |
        docker run -d -p 5000:5000 --name test-container quakewatch:test
        sleep 10
        docker ps
        curl http://localhost:5000/ping || curl http://localhost:5000/ || echo "Application is running"
        docker stop test-container

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy message
      run: |
        echo "Deployment stage completed successfully!"
        echo "Ready for production deployment"
